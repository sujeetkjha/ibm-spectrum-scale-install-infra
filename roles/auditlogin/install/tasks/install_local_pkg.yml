---

# Local package installation method
- block:  ## run_once: true
  - name: install | Stat local installation package
    stat:
     path: "{{ scale_install_localpkg_path }}"
    register: scale_install_localpkg

  - name: install | Check local installation package
    assert:
     that: scale_install_localpkg.stat.exists
     msg: >-
          Please set the variable 'scale_install_localpkg_path' to point to the
          local installation package (accessible on Ansible control machine)!

# Optionally, verify package checksum

  - name: install | Stat checksum file
    stat:
     path: "{{ scale_install_localpkg_path }}.md5"
    register: scale_install_md5_file


  - block:  ## when: scale_install_md5_file.stat.exists
    - name: install | Read checksum from file
      set_fact:
       scale_install_md5_sum: "{{ lookup('file', scale_install_localpkg_path + '.md5') }}"

    - name: install | Compare checksums
      assert:
       that: scale_install_md5_sum.strip().split().0 == scale_install_localpkg.stat.md5
       msg: >-
              Checksums don't match. Please check integritiy of your local
              installation package!

    when: scale_install_md5_file.stat.exists
  run_once: true
  delegate_to: localhost


# Copy installation package

- name: install | Stat extracted packages
  stat:
   path: /usr/lpp/mmfs/{{ scale_version }}/gpfs_rpms
  register: scale_install_gpfs_rpmdir

- block:  ## when: not scale_install_gpfs_rpmdir.stat.exists
  - name: install | Stat temporary directory
    stat:
     path: "{{ scale_install_localpkg_tmpdir_path }}"
    register: scale_install_localpkg_tmpdir


  - name: install | Check temporary directory
    assert:
     that:
     - scale_install_localpkg_tmpdir.stat.exists
     - scale_install_localpkg_tmpdir.stat.isdir
     msg: >-
          Please set the variable 'scale_install_localpkg_tmpdir_path' to point
          to a temporary directory on the remote system!


  - name: install | Copy installation package to node
    copy:
     src: "{{ scale_install_localpkg_path }}"
     dest: "{{ scale_install_localpkg_tmpdir_path }}"
     mode: a+x
  when: not scale_install_gpfs_rpmdir.stat.exists


# Extract installation package


- name: install | Extract installation package
  vars:
   localpkg: "{{ scale_install_localpkg_tmpdir_path + '/' + scale_install_localpkg_path | basename }}"
  command: "{{ localpkg + ' --silent' }}"
  args:
   creates: /usr/lpp/mmfs/{{ scale_version }}/gpfs_rpms


- name: install | Stat extracted packages
  stat:
   path: /usr/lpp/mmfs/{{ scale_version }}/gpfs_rpms
  register: scale_install_gpfs_rpmdir


- name: install | Check extracted packages
  assert:
   that:
   - scale_install_gpfs_rpmdir.stat.exists
   - scale_install_gpfs_rpmdir.stat.isdir
   msg: >-
      The variable 'scale_version' doesn't seem to match the contents of the
      local installation package!


# Delete installation package


- name: install | Delete installation package from node
  file:
   path: "{{ scale_install_localpkg_tmpdir_path + '/' + scale_install_localpkg_path | basename }}"
   state: absent

- name: install | Set package arch
  set_fact:
   package_arch: 'el'

- name: install | Set package arch
  set_fact:
   package_arch: 'U'
  when: ansible_distribution in scale_ubuntu_distribution

- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_rpms/rhel/'
  when: ansible_distribution == 'RedHat' and ansible_distribution_major_version == '7'


- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_rpms/rhel/'
  when: ansible_distribution == 'RedHat' and ansible_distribution_major_version == '8'

- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_debs/ubuntu/ubuntu16/'
  when: ansible_distribution in scale_ubuntu_distribution and ansible_distribution_major_version == '16'

- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_debs/ubuntu/ubuntu18/'
  when: ansible_distribution in scale_ubuntu_distribution and ansible_distribution_major_version == '18'

- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_rpms/sles12/'
  when: ansible_distribution in scale_sles_distribution and ansible_distribution_major_version == '16'

- name: install | auditlogin path
  set_fact:
   auditlogin_url: 'gpfs_rpms/sles15/'
  when: ansible_distribution in scale_sles_distribution and ansible_distribution_major_version == '15'

# Find auditlogin rpms
- block:  ## when: host is defined as a protocol node

  - name: install | Find gpfs.librdkafka (gpfs.librdkafka) RPM
    find:
     paths: /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}
     patterns: gpfs.librdkafka*.rpm
    register: scale_install_gpfs_auditlogin


  - debug: 
     msg: "{{ scale_install_gpfs_auditlogin }}" 

  - name: install | Check valid GPFS (gpfs.librdkafka) RPM
    assert:
     that: scale_install_gpfs_auditlogin.matched > 0
     msg: >-
          No GPFS auditlogin librakafka(gpfs.librdkafka) RPM found
          /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}gpfs.librdkafka*.rpm

  - debug:
     msg: "{{ scale_install_gpfs_auditlogin }}"

  - name: install | Add GPFS auditlogin RPMs to list
    vars:
     current_rpm: /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}{{ item }}.rpm
    set_fact:
     scale_install_all_rpms: "{{ scale_install_all_rpms + [ current_rpm ] }}"
    with_items:
    - "{{ scale_install_gpfs_auditlogin.files.0.path | basename | regex_replace('\\.rpm$', '') }}"


- block:  ## when: host is defined as a protocol node

  - name: install | Find gpfs.kafka (gpfs.kafka) RPM
    find:
     paths: /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}
     patterns: gpfs.kafka*.rpm
    register: scale_install_gpfs_kafka


  - debug:
     msg: "{{ scale_install_gpfs_kafka }}"

  - name: install | Check valid GPFS (gpfs.kafka) RPM
    assert:
     that: scale_install_gpfs_kafka.matched > 0
     msg: >-
          No GPFS auditlogin librakafka(gpfs.librdkafka) RPM found
          /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}gpfs.kafka*.rpm

  - debug:
     msg: "{{ scale_install_gpfs_kafka }}"

  - name: install | Add GPFS kafka RPMs to list
    vars:
     current_rpm: /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}{{ item }}.rpm
    set_fact:
     scale_install_all_rpms: "{{ scale_install_all_rpms + [ current_rpm ] }}"
    with_items:
    - "{{ scale_install_gpfs_kafka.files.0.path | basename | regex_replace('\\.rpm$', '') }}"

- block:
  - name: install | Find gpfs.java (gpfs.java) RPM
    find:
     paths: /usr/lpp/mmfs/{{ scale_version }}/gpfs_rpms
     patterns: gpfs.java-*.rpm
     # use_regex: yes
    register: scale_install_gpfs_java
  - debug:
          msg: "java rpms for java {{ scale_install_gpfs_java }}"
  - name: install | Check valid GPFS (gpfs.java) RPM
    assert:
     that: scale_install_gpfs_java.matched > 0
     msg: "No GPFS java (gpfs.java) RPM found: /usr/lpp/mmfs/{{ scale_version }}/gpfs.java*.rpm"

  - name: install | Add GPFS java RPM to list
    vars:
     current_rpm: "/usr/lpp/mmfs/{{ scale_version }}/gpfs_rpms/{{ item }}.rpm"
    set_fact:
     scale_install_all_rpms: "{{ scale_install_all_rpms + [ current_rpm ] }}"
    with_items:
    - "{{ scale_install_gpfs_java.files.0.path | basename | regex_replace('\\.rpm$', '') }}"


- block:

  - name: install | Find gpfs.librdkafka (gpfs.librdkafka) RPM
    find:
     paths: /usr/lpp/mmfs/{{ scale_version }}/{{ auditlogin_url }}
     patterns: gpfs.librdkafka*.rpm
    register: scale_install_gpfs_auditlogin
